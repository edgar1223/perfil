<section id="home" class="hero-section">
    <div class="hero-container">
        <div class="hero-grid">
            <!-- Columna izquierda - Información -->
            <div class="hero-content">
                <span class="badge">Desarrollador Full Stack</span>

                <h1 class="name">
                    Edgar David <span class="highlight">Jiménez Jijón</span>
                </h1>

                <div class="title-container">
                    <h2>Ingeniero en Sistemas Computacionales</h2>
                </div>

                <p class="description">
                    {{ description }}
                </p>

                <!-- Reconocimientos -->
                <div class="achievements-section">
                    <h3>Reconocimientos</h3>
                    <div class="achievement-list">
                        <div *ngFor="let achievement of achievements" class="achievement-item">
                            <span class="achievement-icon">🏅</span>
                            <span>{{ achievement }}</span>
                        </div>
                    </div>
                </div>

                <!-- Botones de acción -->
                <div class="action-buttons">
                    <button class="btn btn-primary" (click)="downloadCV()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Descargar CV
                    </button>
                    <button class="btn btn-secondary" (click)="openGitHub()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
                        </svg>
                        GitHub
                    </button>
                    <button class="btn btn-secondary" (click)="openLinkedIn()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
                            <rect x="2" y="9" width="4" height="12" />
                            <circle cx="4" cy="4" r="2" />
                        </svg>
                        LinkedIn
                    </button>
                </div>
            </div>

            <!-- Columna derecha - Perfil y stats -->
            <div class="hero-sidebar">
                <!-- Avatar -->
                <div class="profile-card">
                    <div class="avatar-wrapper">
                        <img src="/perfil.jpeg" alt="Edgar Jiménez" class="profile-image" />
                    </div>
                    <div class="availability">
                        <span class="status-dot"></span>
                        Disponible para trabajo
                    </div>
                </div>

                <!-- Stats profesionales -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-number">2+</div>
                        <div class="stat-label">Años de experiencia</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">10+</div>
                        <div class="stat-label">Proyectos completados</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
